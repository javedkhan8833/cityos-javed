server {
    listen 80;
    listen [::]:80;
    server_name fleetops.mvplab.sa;

    location / {
        proxy_pass http://127.0.0.1:15000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
